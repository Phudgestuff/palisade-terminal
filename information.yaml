introtext: |-
  Welcome to the P.A.L.I.S.A.D.E. Interactive Information Terminal.
  
  All information is strictly confidential. Close this program as soon as you are finished using it.
  
  Query information by typing the name of what you are looking for (shown in square brackets).

  Recommended areas of interest:
    * PALISADE Initiation [initiation]
    * Memetophage Incident Archives [archives]
    * Log of Operational Task Forces [task forces]
    * Log of Task Force Personnel [personnel]

initiation: |-
  P.A.L.I.S.A.D.E Initiation Information
  — — — — — — — — — — — — — — — — — — — — — 

  Welcome new recruit, to Palisade; the Protective Agency for Liminal and Irregular Spatial Anomalies, Detection, and Enforcement. 

  If you are reading this it is to be presumed you have been inducted into our agency, whether this is voluntary or you have been “Compelled” to join makes no difference. You have now become an agent, your position and existence has now become classified, as part of your introductory package any and all unspent criminal convictions have been cleared, all documents detailing your life have been permanently erased, all personal articles not on your person have been incinerated and all existing family members, friends, acquaintances or other individuals aware of you have had their memories altered to avoid the leaking of cognito-hazardous material.

  As of now, your position is classified as being of Class 5 importance, this means you have the minimum clearance required to know about Liminal, Irregular and Spatial Anomalies, including but not limited to the Memetophage phenomena. It should be noted this is the lowest level of clearance provided at Palisade, should you work diligently for the cause, your clearance and rank will be increased in accordance, as will your salary. 

  For a brief history of PALISADE, type [history].
  For information on the clearence system, type [clearance system].
  For information on the Memetophage Phenomena, type [memetophage]
  For information on the Host Temperance Experiments, type [hte]

history: |-
  A brief History of P.A.L.I.S.A.D.E;

  P.A.L.I.S.A.D.E as an organisation was formed in England in 1838 after the continued appearance of the Transitional Class Memetophage nicknamed Spring-Heeled Jack, by one Henry Beresford, 3rd Marquess of Waterford. Using his at the time impressive wealth, connections and education he founded P.A.L.I.S.A.D.E which at the time was called The Society for the Investigation of Extraordinary Occurrences, this name would later be changed in 1896 to the Office of Irregular Affairs when it was recognised as an official classified branch of the government by the UK and then once more to P.A.L.I.S.A.D.E. in 1948 when the branch was accepted as an international agency by the UN security council and granted authority of the highest order.

  At the current moment, P.A.L.I.S.A.D.E. has 17 major bases around the globe and several hundred other smaller black-sites for investigation and research. As well as this, we have agents in every major government agency in the world with the exceptions of North Korea, Iran, Taliban ruled Afghanistan and Israel.

  The main HQ for P.A.L.I.S.A.D.E. is kept in an advanced high-class extra-government facility in York England at [EXPUNGED], [EXPUNGED].

  Other major bases are housed in;

  * Edinburgh, Scotland
  * London, England
  * Prague, Czech Republic
  * Rome, Italy
  * Istanbul, Turkiye
  * Cairo, Egypt
  * Addis Ababa, Ethiopia
  * Kyoto, Japan
  * Beijing, China
  * Moscow, Russia
  * Salem, USA
  * New Orleans, USA
  * Junee, Australia
  * Roswell / Nevada Test Range Complex, USA
  * Lima, Peru
  * Auckland, New Zealand

