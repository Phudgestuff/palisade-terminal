clearance system: |-
  The Palisade organisation utilises a series of six classes indicating the amount of knowledge able to be held by the recipients under this class, as a recruit you will be of class 5, meaning you will only know basic details of Memetophage classification, profiles and incidents. Insistence upon obtaining more knowledge when of an inappropriate rank will result in your immediate termination.

  Each class has several ranks within it, with each rank your authority over the ranks below you increase as does your pay. You will receive a rank slide signifying your new rank and a coloured epaulette will be provided indicating your Class. These are to be worn at all times unless in civilian attire, in an emergency situation or while undercover.

  The classes are as such;

  * Class 5; Initiates, Privates and Lance Corporals. Navy Epaulettes.
  * Class 4; Corporals, Lance Sergeants and Sergeants. Turquoise Epaulettes.
  * Class 3; Sergeant First Class, Master Sergeant and Sergeant Major. Violet Epaulettes.
  * Class 2; Major, General and Lieutenant General. Grey Epaulettes.
  * Class 1; Colonel, Captain and Warrant Officer. Black Epaulettes.
  * Special Class;  Independent Investigator. Maroon Epaulettes.


  It should be noted the Independent Investigator rank and Special Class level of clearance are reserved only for those in the organisation of especially high skill and prestige. To date only 7 agents have received the rank of Independent Investigator. It is a rank reserved for those that Palisade trusts to investigate, catalogue, containment and/or neutralisation of high risk Memetophages.

