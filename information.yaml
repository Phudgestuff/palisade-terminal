memetophage: |-
  In this short briefing, you will learn the bare minimum knowledge required for new recruits to begin missions to extract, neutralise or contain memetophages to prevent a Ragnarok level extinction event.

  The Memetophage phenomenon refers to the breaching of our reality by what is believed to be an alternate dimension. As far as we are aware these breaches have occurred throughout human history though have only been catalogued in recent centuries thanks to the progression of modern science.

  The entities responsible for these breaches have been labeled Memetophages or more simply Memory Eaters. This is due to their tendency to feed upon human memories in order to achieve a corporeal form. Until this form has been achieved there is no known way to neutralise or contain a Memetophage, regrettably this means a host must be sacrificed in order to neutralise or contain a Memetophage. Though it should be noted that multiple Memetophages can come from a single host and a single Memetophage can stem from a host community. Fortunately neutralisation of a Memetophage is not always fatal to the Host but can be in rare cases of total infection.

  Further details will be provided on a Need-to-Know basis. As an Initiate, the knowledge required is rather basic; the details enclosed below are the limits of your current required knowledge, any attempts to seek out more knowledge will result in a pay-cut or in more serious offenses, your termination;

  A Memetophage will feed off of the information stored within a Host or Host communities memories, using this information the Memetophage will assume a corporeal form, this manifests most commonly as an item or entity of worship, great importance or of great fear. 

  These Memetophage by currently unknown anomalous means manifest unique abilities according to their form and the beliefs and memories of their hosts, leading to great variation in Memetophage morphology.

  Some examples of Famous Memetophage incidents may include, the emergence of Spring-Heeled Jack, The Roswell incident, The Salem Witch Trials, Skinwalker Ranch, The Dyatlov Pass Incident, etc.

  Memetophages may change Hosts as Host Populations ages, they also grow more powerful with age, as such they are ranked upon a 4 point scale, with each level signifying an age and their danger threshold, these will be listed below starting with the youngest, aging in descending order;

  * Contemporary - “Born” within the last 100 years
  * Transitional - “Born” within the last 101-500 years
  * Classical - “Born” within the last 501-2000 years
  * Ancient - “Born” within the last 2001-10,000 years
  * Primordial - “Born” at least 10,000 years ago

