hte: |-
  This is a highly classified series of experiments, the information on these is highly redacted. As such the only details provided in this briefing will be those necessary to your work as an Initiate.

  The Host Temperance Experiments, codenamed Project Engram, took place in 1977. over 150 Memetophage hosts were taken into custody by Palisade. These hosts were particularly those with whom an intensely strong bond to the Memetophage feeding on them was formed, over 40% of the Subjects had their own bodies become the corporeal form of their Memetophage, a further 70% of these subjects had retained control of their bodies working in tandem with the Memetophage.

  The goal of these tests was to create a super-force of Palisade agents able to symbiotically control and work with the Memetophages they hosted in order to access the power they possessed. This was accomplished by a unique form of meditation accompanied by the testing of psychoactive drugs and exposure to Hypno-therapy. In the end, satisfactory results were seen in 42 of the subjects, all bar [REDACTED], of which were those who had become the corporeal forms for a Memetophage and those who had retained their own consciousness.

  These results were deemed a great success and the Host Temperance experiments were closed, the 108 subjects who had failed to display control over their Memetophage either succumbed to complications involved in the testing, were contained or terminated. From the 42 successful subjects, 4 task forces were formed. All of these Subjects now rank as Lieutenant or Higher.

